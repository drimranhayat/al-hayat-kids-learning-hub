function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function prepareQuestion(q){if(q.type!=="mcq"||!Array.isArray(q.options))return q;const o=shuffle(q.options.map((_,i)=>i));return{...q,options:o.map(i=>q.options[i]),answer:o.indexOf(q.answer)};}
function mergeBank(base,ext){const map={},order=[];base.forEach(s=>{map[s.id]={...s,questions:[...s.questions]};order.push(s.id);});
  if(ext&&Array.isArray(ext.subjects)){ext.subjects.forEach(es=>{if(!es||!es.id)return;const qs=Array.isArray(es.questions)?es.questions:[];
    if(map[es.id]){map[es.id].questions=[...map[es.id].questions,...qs];if(es.name)map[es.id].name=es.name;if(es.emoji)map[es.id].emoji=es.emoji;if(es.color)map[es.id].color=es.color;}
    else{map[es.id]={id:es.id,name:es.name||es.id,emoji:es.emoji||"📚",color:es.color||"from-slate-400 to-slate-500",soft:es.soft||"bg-slate-50",questions:qs};order.push(es.id);}});}
  return order.map(id=>map[id]);}

function useSound(enabled){const ref=useRef(null);
  const beep=(f,d=0.12,t="sine",w=0)=>{if(!enabled)return;try{if(!ref.current)ref.current=new(window.AudioContext||window.webkitAudioContext)();const c=ref.current;const o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(c.destination);const s=c.currentTime+w;g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(0.18,s+0.02);g.gain.exponentialRampToValueAtTime(0.0001,s+d);o.start(s);o.stop(s+d);}catch(e){}};
  return{correct:()=>{beep(523,.12);beep(659,.12,"sine",.1);beep(784,.18,"sine",.2);},wrong:()=>{beep(330,.18,"triangle");beep(247,.22,"triangle",.12);},tap:()=>beep(440,.06,"sine"),win:()=>{[523,587,659,784,880].forEach((f,i)=>beep(f,.16,"sine",i*.11));}};}

function Confetti({show}){if(!show)return null;const e=["🌟","✨","🎉","⭐","💫","🎊"];
  return <div className="pointer-events-none fixed inset-0 overflow-hidden z-50">{Array.from({length:30}).map((_,i)=>(
    <div key={i} className="absolute text-2xl" style={{left:(Math.random()*100)+"%",top:"-10%",animation:`fall ${1.5+Math.random()*1.5}s linear ${Math.random()*0.5}s forwards`}}>{e[i%e.length]}</div>))}</div>;}

function Mascot({mood="happy",size="text-6xl"}){const f=mood==="cheer"?"🌟":mood==="think"?"🌜":"🌙";
  return <div className={size+" inline-block"} style={{animation:"bob 2.5s ease-in-out infinite"}}>{f}</div>;}

const DEFAULT_PROGRESS={totalStars:0,points:0,perfects:0,completed:{},best:{}};
const STORE_KEY="alhayat_starquest_progress";

function App(){
  const [screen,setScreen]=useState("home");
  const [progress,setProgress]=useState(DEFAULT_PROGRESS);
  const [sound,setSound]=useState(true);
  const sfx=useSound(sound);
  const [subjects,setSubjects]=useState(BUILTIN);
  const [subject,setSubject]=useState(null);
  const [activeQ,setActiveQ]=useState([]);
  const [qIndex,setQIndex]=useState(0);
  const [selected,setSelected]=useState(null);
  const [locked,setLocked]=useState(false);
  const [roundScore,setRoundScore]=useState(0);
  const [feedback,setFeedback]=useState(null);
  const [confetti,setConfetti]=useState(false);
  const [resultData,setResultData]=useState(null);
  const [newBadges,setNewBadges]=useState([]);

  useEffect(()=>{try{const r=localStorage.getItem(STORE_KEY);if(r)setProgress({...DEFAULT_PROGRESS,...JSON.parse(r)});}catch(e){}},[]);
  useEffect(()=>{(async()=>{try{const res=await fetch("questions.json",{cache:"no-store"});if(res.ok){const data=await res.json();setSubjects(mergeBank(BUILTIN,data));}}catch(e){}})();},[]);

  const save=(next)=>{setProgress(next);try{localStorage.setItem(STORE_KEY,JSON.stringify(next));}catch(e){}};
  const totalQuestions=subjects.reduce((n,s)=>n+s.questions.length,0);
  const earnedBadges=BADGES.filter(b=>b.need(progress));

  const startSubject=(subj)=>{sfx.tap();const pool=shuffle(subj.questions).slice(0,Math.min(ROUND_SIZE,subj.questions.length)).map(prepareQuestion);
    setSubject(subj);setActiveQ(pool);setQIndex(0);setSelected(null);setLocked(false);setRoundScore(0);setFeedback(null);setScreen("play");};

  const answer=(choice)=>{if(locked)return;const q=activeQ[qIndex];const correct=choice===q.answer;setSelected(choice);setLocked(true);
    if(correct){setRoundScore(s=>s+1);setFeedback({correct:true,text:PRAISE[Math.floor(Math.random()*PRAISE.length)],why:q.why});sfx.correct();setConfetti(true);setTimeout(()=>setConfetti(false),1400);}
    else{setFeedback({correct:false,text:TRY_AGAIN[Math.floor(Math.random()*TRY_AGAIN.length)],why:q.why});sfx.wrong();}};

  const next=()=>{if(qIndex+1<activeQ.length){setQIndex(i=>i+1);setSelected(null);setLocked(false);setFeedback(null);}else{finishRound();}};

  const finishRound=()=>{const total=activeQ.length,score=roundScore;
    const stars=score===total?3:score>=Math.ceil(total*0.6)?2:score>=Math.ceil(total*0.3)?1:0;
    const pts=score*10+(score===total?20:0);const prevBest=progress.best[subject.id]||0;const isNewBest=stars>prevBest;
    const np={...progress,totalStars:progress.totalStars+(isNewBest?stars-prevBest:0),points:progress.points+pts,perfects:progress.perfects+(score===total?1:0),
      completed:{...progress.completed,[subject.id]:(progress.completed[subject.id]||0)+1},best:{...progress.best,[subject.id]:Math.max(prevBest,stars)}};
    const before=BADGES.filter(b=>b.need(progress)).map(b=>b.id);const fresh=BADGES.filter(b=>b.need(np)).filter(b=>!before.includes(b.id));
    save(np);setResultData({score,total,stars,pts});setNewBadges(fresh);if(stars>=2)sfx.win();setScreen("result");};

  const TopBar=({showHome=true})=>(
    <div className="flex items-center justify-between mb-4">
      <div className="flex items-center gap-2">
        {showHome&&<button onClick={()=>{sfx.tap();setScreen("home");}} className="w-11 h-11 rounded-2xl bg-white shadow-sm flex items-center justify-center text-teal-600 active:scale-90 transition"><IHome size={22}/></button>}
      </div>
      <div className="flex items-center gap-2">
        <div className="flex items-center gap-1 bg-white rounded-2xl px-3 py-2 shadow-sm"><IStar size={18} className="text-amber-400"/><span className="font-bold text-slate-700">{progress.totalStars}</span></div>
        <div className="flex items-center gap-1 bg-white rounded-2xl px-3 py-2 shadow-sm"><ISparkle size={18} className="text-violet-500"/><span className="font-bold text-slate-700">{progress.points}</span></div>
        <button onClick={()=>setSound(s=>!s)} className="w-11 h-11 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-500 active:scale-90 transition">{sound?<IVol size={20}/>:<IMute size={20}/>}</button>
      </div>
    </div>
  );

  if(screen==="home")return(
    <div className="min-h-screen bg-gradient-to-br from-teal-50 via-sky-50 to-violet-50 p-4 sm:p-6">
      <div className="max-w-md mx-auto">
        <TopBar showHome={false}/>
        <div className="text-center mt-6 mb-8">
          <Mascot mood="cheer" size="text-7xl"/>
          <h1 className="text-3xl sm:text-4xl font-extrabold mt-3 bg-gradient-to-r from-teal-600 to-violet-600 bg-clip-text text-transparent">Al-Hayat Star Quest</h1>
          <p className="text-slate-500 mt-2 font-medium">Learn, play and collect stars! ⭐</p>
        </div>
        <button onClick={()=>{sfx.tap();setScreen("subjects");}} className="w-full bg-gradient-to-r from-teal-500 to-cyan-500 text-white text-xl font-bold py-5 rounded-3xl shadow-lg active:scale-95 transition flex items-center justify-center gap-2 mb-4"><span>Start Learning</span><IChev size={24}/></button>
        <div className="grid grid-cols-2 gap-3 mb-4">
          <button onClick={()=>{sfx.tap();setScreen("badges");}} className="bg-white rounded-3xl p-4 shadow-sm active:scale-95 transition text-left"><IAward size={26} className="text-amber-400 mb-1"/><div className="font-bold text-slate-700">My Badges</div><div className="text-sm text-slate-400">{earnedBadges.length} of {BADGES.length}</div></button>
          <div className="bg-white rounded-3xl p-4 shadow-sm"><ITrophy size={26} className="text-violet-500 mb-1"/><div className="font-bold text-slate-700">{progress.points} points</div><div className="text-sm text-slate-400">{progress.totalStars} stars earned</div></div>
        </div>
        <div className="bg-white/70 rounded-3xl p-4 text-center text-sm text-slate-500 leading-relaxed">🕌 {subjects.length} subjects · {totalQuestions} questions · No login needed</div>
        {progress.totalStars>0&&<button onClick={()=>{sfx.tap();save(DEFAULT_PROGRESS);}} className="w-full mt-4 text-slate-400 text-sm font-medium flex items-center justify-center gap-1 active:scale-95 transition"><IRefresh size={14}/> Reset progress</button>}
      </div>
    </div>
  );

  if(screen==="subjects")return(
    <div className="min-h-screen bg-gradient-to-br from-teal-50 via-sky-50 to-violet-50 p-4 sm:p-6">
      <div className="max-w-md mx-auto">
        <TopBar/>
        <h2 className="text-2xl font-extrabold text-slate-700 mb-1">Choose a Subject 🎒</h2>
        <p className="text-slate-400 mb-5 font-medium">Tap a card to start playing!</p>
        <div className="grid grid-cols-2 gap-3">
          {subjects.map(s=>{const best=progress.best[s.id]||0;return(
            <button key={s.id} onClick={()=>startSubject(s)} className={"relative bg-gradient-to-br "+s.color+" rounded-3xl p-4 text-white shadow-md active:scale-95 transition text-left overflow-hidden"}>
              <div className="text-4xl mb-2">{s.emoji}</div>
              <div className="font-bold leading-tight">{s.name}</div>
              <div className="text-xs text-white/80 mt-1">{s.questions.length} questions</div>
              <div className="flex gap-0.5 mt-2">{[0,1,2].map(i=><IStar key={i} size={16} className={i<best?"text-white":"text-white/40"}/>)}</div>
            </button>);})}
        </div>
      </div>
    </div>
  );

  if(screen==="play"&&subject&&activeQ.length){const q=activeQ[qIndex];const pct=(qIndex/activeQ.length)*100;return(
    <div className={"min-h-screen bg-gradient-to-br "+(subject.soft||"bg-slate-50")+" to-white p-4 sm:p-6"}>
      <Confetti show={confetti}/>
      <div className="max-w-md mx-auto">
        <TopBar/>
        <div className="flex items-center gap-2 mb-1">
          <span className="text-3xl">{subject.emoji}</span>
          <div className="flex-1">
            <div className="flex justify-between text-xs font-bold text-slate-400 mb-1"><span>{subject.name}</span><span>{qIndex+1} / {activeQ.length}</span></div>
            <div className="h-3 bg-white rounded-full overflow-hidden shadow-inner"><div className={"h-full bg-gradient-to-r "+subject.color+" transition-all duration-500"} style={{width:pct+"%"}}/></div>
          </div>
        </div>
        <div className="bg-white rounded-3xl p-5 shadow-sm mt-5 mb-4">
          <div className="text-xs font-bold uppercase tracking-wide text-slate-300 mb-2">{q.type==="tf"?"True or False":"Pick the answer"}</div>
          <p className="text-xl font-bold text-slate-700 leading-snug">{q.q}</p>
        </div>
        {q.type==="tf"?(
          <div className="grid grid-cols-2 gap-3">
            {[{t:"True",v:true,e:"✅"},{t:"False",v:false,e:"❌"}].map(opt=>{const isSel=selected===opt.v;const show=locked&&(opt.v===q.answer||isSel);const right=opt.v===q.answer;
              return <button key={opt.t} disabled={locked} onClick={()=>answer(opt.v)} className={"py-6 rounded-3xl font-bold text-lg shadow-sm transition active:scale-95 "+(!locked?"bg-white text-slate-700 hover:shadow-md":show?(right?"bg-emerald-500 text-white":"bg-rose-400 text-white"):"bg-white text-slate-300")}><div className="text-2xl mb-1">{opt.e}</div>{opt.t}</button>;})}
          </div>
        ):(
          <div className="grid grid-cols-1 gap-3">
            {q.options.map((opt,i)=>{const isSel=selected===i;const show=locked&&(i===q.answer||isSel);const right=i===q.answer;
              return <button key={i} disabled={locked} onClick={()=>answer(i)} className={"w-full text-left px-5 py-4 rounded-3xl font-bold text-lg shadow-sm transition active:scale-95 flex items-center justify-between "+(!locked?"bg-white text-slate-700 hover:shadow-md":show?(right?"bg-emerald-500 text-white":"bg-rose-400 text-white"):"bg-white text-slate-300")}><span>{opt}</span>{locked&&show&&(right?<ICheck size={22}/>:<IX size={22}/>)}</button>;})}
          </div>
        )}
        {feedback&&(
          <div className={"mt-4 rounded-3xl p-4 "+(feedback.correct?"bg-emerald-50":"bg-amber-50")}>
            <div className="flex items-center gap-2 mb-1"><Mascot mood={feedback.correct?"cheer":"think"} size="text-3xl"/><span className={"font-extrabold text-lg "+(feedback.correct?"text-emerald-600":"text-amber-600")}>{feedback.text}</span></div>
            <p className="text-slate-600 font-medium leading-snug">{feedback.why}</p>
            <button onClick={()=>{sfx.tap();next();}} className={"w-full mt-3 py-4 rounded-2xl text-white font-bold shadow-md active:scale-95 transition flex items-center justify-center gap-1 "+(feedback.correct?"bg-emerald-500":"bg-amber-500")}>{qIndex+1<activeQ.length?"Next":"Finish"}<IChev size={20}/></button>
          </div>
        )}
      </div>
    </div>
  );}

  if(screen==="result"&&resultData){const{score,total,stars,pts}=resultData;return(
    <div className="min-h-screen bg-gradient-to-br from-teal-50 via-sky-50 to-violet-50 p-4 sm:p-6 flex items-center">
      <Confetti show={stars>=2}/>
      <div className="max-w-md mx-auto w-full">
        <div className="bg-white rounded-3xl p-6 shadow-lg text-center">
          <Mascot mood="cheer" size="text-6xl"/>
          <h2 className="text-2xl font-extrabold text-slate-700 mt-2">{stars===3?"Perfect! Mashallah! 🎉":stars>=1?"Well done! 🌟":"Good try! 💪"}</h2>
          <div className="flex justify-center gap-2 my-4">{[0,1,2].map(i=><IStar key={i} size={44} className={i<stars?"text-amber-400":"text-slate-200"}/>)}</div>
          <p className="text-slate-500 font-medium">You got <b className="text-slate-700">{score} of {total}</b> right</p>
          <div className="inline-flex items-center gap-1 bg-violet-50 text-violet-600 font-bold rounded-2xl px-4 py-2 mt-3"><ISparkle size={18}/> +{pts} points</div>
          {newBadges.length>0&&(
            <div className="mt-5 bg-amber-50 rounded-2xl p-4">
              <div className="font-bold text-amber-600 mb-2 flex items-center justify-center gap-1"><IAward size={18}/> New badge{newBadges.length>1?"s":""}!</div>
              <div className="flex justify-center gap-3 flex-wrap">{newBadges.map(b=><div key={b.id} className="text-center"><div className="text-4xl">{b.emoji}</div><div className="text-xs font-bold text-slate-600 mt-1">{b.name}</div></div>)}</div>
            </div>
          )}
          <div className="grid grid-cols-2 gap-3 mt-6">
            <button onClick={()=>startSubject(subject)} className="py-4 rounded-2xl bg-slate-100 text-slate-600 font-bold active:scale-95 transition flex items-center justify-center gap-1"><IRefresh size={18}/> Replay</button>
            <button onClick={()=>{sfx.tap();setScreen("subjects");}} className="py-4 rounded-2xl bg-gradient-to-r from-teal-500 to-cyan-500 text-white font-bold active:scale-95 transition flex items-center justify-center gap-1">More <IChev size={18}/></button>
          </div>
        </div>
      </div>
    </div>
  );}

  if(screen==="badges")return(
    <div className="min-h-screen bg-gradient-to-br from-teal-50 via-sky-50 to-violet-50 p-4 sm:p-6">
      <div className="max-w-md mx-auto">
        <TopBar/>
        <h2 className="text-2xl font-extrabold text-slate-700 mb-1 flex items-center gap-2"><IAward className="text-amber-400"/> My Badges</h2>
        <p className="text-slate-400 mb-5 font-medium">Earn them all by learning! 🌟</p>
        <div className="grid grid-cols-1 gap-3">
          {BADGES.map(b=>{const got=b.need(progress);return(
            <div key={b.id} className={"flex items-center gap-4 rounded-3xl p-4 shadow-sm "+(got?"bg-white":"bg-white/50")}>
              <div className={"text-4xl "+(got?"":"grayscale opacity-40")}>{got?b.emoji:"🔒"}</div>
              <div className="flex-1"><div className={"font-bold "+(got?"text-slate-700":"text-slate-400")}>{b.name}</div><div className="text-sm text-slate-400">{b.desc}</div></div>
              {got&&<ICheck className="text-emerald-500" size={22}/>}
            </div>);})}
        </div>
        <div className="mt-6 bg-white rounded-3xl p-4 text-center"><div className="flex items-center justify-center gap-2 text-slate-600 font-bold"><IHeart className="text-rose-400" size={18}/> {earnedBadges.length} of {BADGES.length} badges earned</div></div>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
